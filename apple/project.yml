name: Slipstream
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages:
  SlipstreamApple:
    path: .
targets:
  Slipstream:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/SlipstreamApp
    info:
      path: Sources/SlipstreamApp/Info.plist
      properties:
        CFBundleDisplayName: Slipstream
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: SlipstreamApple
        product: SlipstreamKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.slipstream.client.ios
        PRODUCT_NAME: Slipstream
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  Slipstream:
    build:
      targets:
        Slipstream: all
    run:
      config: Debug
    archive:
      config: Release
